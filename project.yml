  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  MatchThree:
    type: application
    platform: macOS
    sources:
      - path: MatchThree.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matchthree.app
