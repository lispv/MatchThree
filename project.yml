name: MatchThree
options:
  bundleIdPrefix: com.jekyll
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  MatchThree:
    type: application
    platform: iOS
    sources:
      - path: MatchThree
    settings:
      base:
        INFOPLIST_FILE: MatchThree/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.jekyll.matchthree
        GENERATE_INFOPLIST_FILE: "NO"
