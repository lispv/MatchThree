name: MatchThree
options:
  bundleIdPrefix: com.matchthree
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  MatchThree:
    type: application
    platform: macOS
    sources:
      - path: .
        excludes:
          - "*.hermesbak.*"
          - "MatchThreeTests/**"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.matchthree.app

  MatchThreeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: MatchThreeTests
    dependencies:
      - target: MatchThree
